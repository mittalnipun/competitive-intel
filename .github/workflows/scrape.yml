name: Competitive Intelligence Scrape

on:
  schedule:
    # Every 2 hours UTC — near-real-time refresh
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles("requirements.txt") }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json — nothing to commit."
          else
            git commit -m "chore: update competitive intelligence data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

