name: Weekly Competitive Intelligence Report

on:
  schedule:
    # Monday 00:00 UTC = Monday 08:00 SGT
    - cron: "0 0 * * 1"
  workflow_dispatch:      # allow manual trigger from Actions tab

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate and send HTML email report
        run: |
          python3 - <<'PYEOF'
          import json, datetime, os, sys

          # ── Load data ─────────────────────────────────────────
          try:
              with open("data.json") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print("data.json not found — skipping report.")
              sys.exit(0)

          items = data.get("items", [])
          if not items:
              print("No signals in data.json — skipping report.")
              sys.exit(0)

          updated = data.get("last_updated", "unknown")
          date_str = datetime.datetime.now(datetime.timezone.utc).strftime("%B %d, %Y")

          # ── Priority counts ───────────────────────────────────
          high   = [i for i in items if i.get("priority") == "HIGH"]
          medium = [i for i in items if i.get("priority") == "MEDIUM"]
          low    = [i for i in items if i.get("priority") == "LOW"]

          def esc(s):
              return (s or "").replace("&","&amp;").replace("<","&lt;").replace(">","&gt;")

          def fmt_date(iso):
              if not iso: return ""
              try:
                  d = iso[:10]  # YYYY-MM-DD
                  dt = datetime.datetime.strptime(d, "%Y-%m-%d")
                  return dt.strftime("%b %d, %Y")
              except Exception:
                  return iso

          def priority_color(p):
              return {"HIGH":"#ff3b30","MEDIUM":"#ff9500","LOW":"#8e8e93"}.get(p,"#8e8e93")

          def priority_bg(p):
              return {"HIGH":"#fff1f0","MEDIUM":"#fff8ee","LOW":"#f2f2f7"}.get(p,"#f2f2f7")

          def card_rows(group):
              if not group:
                  return "<tr><td colspan='3' style='padding:12px 16px;color:#6e6e73;font-size:13px;'>No signals in this category.</td></tr>"
              rows = []
              for item in group:
                  pc = priority_color(item.get("priority","LOW"))
                  url = esc(item.get("url","#"))
                  headline = esc(item.get("headline",""))
                  why = esc(item.get("why_matters",""))
                  comp = esc(item.get("competitor",""))
                  date = esc(fmt_date(item.get("date","")))
                  src = esc(item.get("publisher") or item.get("source",""))
                  rows.append(f"""
                  <tr>
                    <td style="padding:14px 16px;border-bottom:1px solid #f2f2f7;vertical-align:top;width:130px;">
                      <span style="font-size:12px;font-weight:700;color:{pc};">{comp}</span>
                    </td>
                    <td style="padding:14px 16px;border-bottom:1px solid #f2f2f7;vertical-align:top;">
                      <a href="{url}" style="color:#1d1d1f;font-weight:600;font-size:13px;text-decoration:none;line-height:1.4;">{headline}</a>
                      <p style="margin:5px 0 0;font-size:12px;color:#3a3a3c;line-height:1.5;">{why}</p>
                    </td>
                    <td style="padding:14px 16px;border-bottom:1px solid #f2f2f7;vertical-align:top;white-space:nowrap;width:100px;">
                      <span style="font-size:11.5px;color:#6e6e73;">{date}</span>
                      {f'<br><span style="font-size:11px;color:#8e8e93;">{src}</span>' if src else ""}
                    </td>
                  </tr>""")
              return "\n".join(rows)

          def section(label, group, bg_color, text_color):
              count = len(group)
              return f"""
              <tr>
                <td colspan="3" style="padding:0;">
                  <div style="background:{bg_color};padding:10px 16px;border-top:2px solid {text_color};">
                    <span style="font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:{text_color};">{label}</span>
                    <span style="font-size:11px;color:{text_color};margin-left:8px;opacity:.7;">{count} signal{"s" if count!=1 else ""}</span>
                  </div>
                </td>
              </tr>
              {card_rows(group)}
              """

          # ── Build HTML ────────────────────────────────────────
          html_body = f"""<!DOCTYPE html>
          <html>
          <head><meta charset="UTF-8"/></head>
          <body style="margin:0;padding:0;background:#f2f2f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
          <table width="100%" cellpadding="0" cellspacing="0" style="background:#f2f2f7;padding:24px 0;">
            <tr><td align="center">
              <table width="680" cellpadding="0" cellspacing="0" style="max-width:680px;width:100%;">

                <!-- Header -->
                <tr>
                  <td style="background:#1d1d1f;border-radius:16px 16px 0 0;padding:24px 28px;">
                    <p style="margin:0;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#8e8e93;">Schneider Electric</p>
                    <h1 style="margin:6px 0 4px;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-.4px;">Competitive Intelligence</h1>
                    <p style="margin:0;font-size:13px;color:#8e8e93;">Weekly Report &middot; {date_str} &middot; Industrial Automation &amp; OT Security</p>
                  </td>
                </tr>

                <!-- Summary bar -->
                <tr>
                  <td style="background:#ffffff;padding:16px 28px;border-bottom:1px solid #e5e5ea;">
                    <table width="100%" cellpadding="0" cellspacing="0">
                      <tr>
                        <td style="text-align:center;padding:0 12px 0 0;">
                          <span style="font-size:28px;font-weight:700;color:#ff3b30;">{len(high)}</span><br>
                          <span style="font-size:11px;color:#6e6e73;font-weight:600;text-transform:uppercase;letter-spacing:.4px;">High</span>
                        </td>
                        <td style="text-align:center;padding:0 12px;border-left:1px solid #e5e5ea;">
                          <span style="font-size:28px;font-weight:700;color:#ff9500;">{len(medium)}</span><br>
                          <span style="font-size:11px;color:#6e6e73;font-weight:600;text-transform:uppercase;letter-spacing:.4px;">Medium</span>
                        </td>
                        <td style="text-align:center;padding:0 12px;border-left:1px solid #e5e5ea;">
                          <span style="font-size:28px;font-weight:700;color:#8e8e93;">{len(low)}</span><br>
                          <span style="font-size:11px;color:#6e6e73;font-weight:600;text-transform:uppercase;letter-spacing:.4px;">Low</span>
                        </td>
                        <td style="text-align:center;padding:0 0 0 12px;border-left:1px solid #e5e5ea;">
                          <span style="font-size:28px;font-weight:700;color:#1d1d1f;">{len(items)}</span><br>
                          <span style="font-size:11px;color:#6e6e73;font-weight:600;text-transform:uppercase;letter-spacing:.4px;">Total signals</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- Signals table -->
                <tr>
                  <td style="background:#ffffff;border-radius:0 0 16px 16px;overflow:hidden;padding-bottom:4px;">
                    <table width="100%" cellpadding="0" cellspacing="0">
                      {section("High Priority", high, "#fff1f0", "#ff3b30")}
                      {section("Medium Priority", medium, "#fff8ee", "#ff9500")}
                      {section("Low Priority", low, "#f2f2f7", "#8e8e93")}
                    </table>
                  </td>
                </tr>

                <!-- Footer -->
                <tr>
                  <td style="padding:20px 0 8px;text-align:center;">
                    <p style="margin:0;font-size:11.5px;color:#8e8e93;">Data refreshes every 2 hours via automated pipeline &middot; Last updated: {esc(updated)}</p>
                    <p style="margin:4px 0 0;font-size:11px;color:#aaaaaa;">Schneider Electric &mdash; Internal use only</p>
                  </td>
                </tr>

              </table>
            </td></tr>
          </table>
          </body>
          </html>"""

          # Write to a temp file that the mail action will read
          with open("/tmp/report.html", "w") as f:
              f.write(html_body)

          print(f"Report generated: {len(items)} signals ({len(high)} HIGH, {len(medium)} MEDIUM, {len(low)} LOW)")
          PYEOF

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Schneider Electric: Competitive Intelligence Report"
          to: ${{ secrets.REPORT_RECIPIENTS }}
          from: "CI Dashboard <${{ secrets.GMAIL_USERNAME }}>"
          html_body: file:///tmp/report.html
          convert_markdown: false
